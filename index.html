<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Chord Transposer (Cloud Editor)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #2563eb; 
            --primary-hover: #1d4ed8; 
            --bg-color: #f8fafc; 
            --card-bg: #ffffff; 
            --text-color: #1e293b; 
            --chord-color: #df5334; 
            --section-bg: #334155; 
            --success-color: #16a34a;
            --border-color: #cbd5e1;
            --input-border: #cbd5e1;
            --instruction-color: #64748b;
        }
        [data-theme="dark"] { 
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --chord-color: #f87171;
            --section-bg: #334155;
            --success-color: #22c55e;
            --border-color: #334155;
            --input-border: #334155;
            --instruction-color: #cbd5e1;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: background-color 0.2s, color 0.2s; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
        @media (min-width: 992px) { .grid { grid-template-columns: 450px 1fr; } }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); height: fit-content; transition: background-color 0.2s; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 6px; font-size: 14px; box-sizing: border-box; background-color: var(--card-bg); color: var(--text-color); }
        textarea { font-family: 'Courier New', Courier, monospace; height: 350px; resize: vertical; }
        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 14px; }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success-color); width: 100%; margin-top: 10px; }
        .btn-success:hover { background-color: #15803d; }
        .btn-outline { background-color: transparent; color: var(--text-color); border: 1px solid var(--border-color); }
        .key-display { font-weight: 600; min-width: 80px; text-align: center; }
        .song-title-view { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .lyrics-sheet { display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 768px) { .lyrics-sheet { grid-template-columns: 1fr 1fr; } }
        .column { font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.8; white-space: pre-wrap; }
        .chord-line { color: var(--chord-color); font-weight: bold; margin-bottom: -4px; display: block; }
        .text-line { display: block; margin-bottom: 8px; }
        .section-header { display: inline-block; background-color: var(--section-bg); color: white; padding: 2px 10px; border-radius: 4px; font-weight: bold; font-size: 13px; margin-top: 14px; margin-bottom: 6px; }
        .instruction { font-size: 12px; color: var(--instruction-color); margin-top: 4px; line-height: 1.4; }
        #themeToggle { min-width: 44px; padding: 8px 12px; font-size: 16px; }
        #statusMsg { font-size: 12px; color: var(--success-color); font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Guitar Chord Transposer</h1></header>
    <div class="grid">
        <div class="card">
            <div class="form-group">
                <label for="songSelect">雲端歌曲列表 (Load Song)</label>
                <select id="songSelect" onchange="loadSelectedSong()">
                    <option value="">-- ✨ 建立新歌曲 --</option>
                </select>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;\">
            <div class="form-group">
                <label for="songTitle">歌名 (Song Title)</label>
                <input type="text" id="songTitle" placeholder="請輸入歌名...">
            </div>
            <div class="form-group">
                <label for="rawLyrics">樂譜與歌詞內容</label>
                <textarea id="rawLyrics" placeholder="[Intro]&#10;C  G  Am  F&#10;&#10;[Verse 1]&#10;C        G&#10;今天我 寒夜裡看雪飄過&#10;&#10;[break]&#10;&#10;[Chorus]&#10;Am       F&#10;原諒我這一生不羈放縱愛自由"></textarea>
                <div class="instruction">
                    * 結構標籤請用中括號，如：[Verse 1], [Chorus], [Bridge], [Coda]<br>
                    * 輸入單獨一行的 <strong>[break]</strong> 即可將之後的內容切換到右邊第二欄。
                </div>
            </div>
            <button class="btn btn-success" onclick="saveSongToCloud()">💾 儲存到雲端 Database</button>
        </div>

        <div class="card">
            <div class="toolbar">
                <button class="btn btn-outline" onclick="changeKey(-1)">Key -1</button>
                <span class="key-display" id="keyOffset">Original</span>
                <button class="btn btn-outline" onclick="changeKey(1)">Key +1</button>
                <button class="btn btn-outline" onclick="resetKey()">Reset</button>
                <button class="btn btn-outline" id="themeToggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>
                <span id="statusMsg"></span>
            </div>
            <div id="songTitleView" class="song-title-view"></div>
            <div class="lyrics-sheet">
                <div id="col1" class="column"></div>
                <div id="col2" class="column"></div>
            </div>
        </div>
    </div>
</div>
<script>
    // 保持空殼，GitHub Actions 會自動注入密碼
    const SUPABASE_URL = "https://isuksiavjfjmjdegyuke.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdWtzaWF2amZqbWpkZWd5dWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Njc5NDgsImV4cCI6MjA5NzQ0Mzk0OH0.-6Fa3farVzZ-eJ8_LUmpL_ABsuXK47M_V-lJY67LqSE"; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const scale = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const flatMap = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };
    let currentOffset = 0, fetchedSongs = [];

    // Dark mode functions
    function loadThemePreference() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme === 'dark' ? 'dark' : 'light');
        updateThemeButton(savedTheme === 'dark');
    }

    function toggleDarkMode() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButton(newTheme === 'dark');
    }

    function updateThemeButton(isDark) {
        const btn = document.getElementById('themeToggle');
        if (btn) btn.innerText = isDark ? '☀️' : '🌙';
    }

    window.onload = function() { loadThemePreference(); fetchAllSongs(); renderSong(); };

    // 即時預覽
    document.getElementById('songTitle').addEventListener('input', () => renderSong());
    document.getElementById('rawLyrics').addEventListener('input', () => renderSong());

    async function fetchAllSongs() {
        const { data, error } = await _supabase.from('songs').select('*').order('title', { ascending: true });
        if (error) return console.error(error);
        fetchedSongs = data;
        const select = document.getElementById('songSelect');
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- ✨ 建立新歌曲 --</option>';
        data.forEach(song => {
            const option = document.createElement('option');
            option.value = song.id; option.innerText = song.title;
            select.appendChild(option);
        });
        if (currentVal) select.value = currentVal;
    }

    function loadSelectedSong() {
        const selectedId = document.getElementById('songSelect').value;
        if (!selectedId) {
            document.getElementById('songTitle').value = "";
            document.getElementById('rawLyrics').value = "";
            resetKey(); renderSong();
            return;
        }
        const song = fetchedSongs.find(s => s.id == selectedId);
        if (song) {
            document.getElementById('songTitle').value = song.title;
            document.getElementById('rawLyrics').value = song.lyrics;
            resetKey(); renderSong();
        }
    }

    // 新增或更新歌曲到 Supabase
    async function saveSongToCloud() {
        const title = document.getElementById('songTitle').value.trim();
        const lyrics = document.getElementById('rawLyrics').value;
        const selectedId = document.getElementById('songSelect').value;
        const statusMsg = document.getElementById('statusMsg');

        if (!title) return alert('請先輸入歌名！');

        statusMsg.innerText = "正在儲存...";
        let error;

        if (selectedId) {
            // 更新舊歌 (這裡需要 RLS 開放 UPDATE 權限，為安全起見，我們暫時用網頁新增。如果想直接在網頁改舊歌，請在 Supabase 額外加上 UPDATE 的政策)
            const result = await _supabase.from('songs').update({ title, lyrics }).eq('id', selectedId);
            error = result.error;
        } else {
            // 新增歌
            const result = await _supabase.from('songs').insert([{ title, lyrics }]);
            error = result.error;
        }

        if (error) {
            statusMsg.innerText = "儲存失敗 ❌";
            alert("錯誤: " + error.message);
        } else {
            statusMsg.innerText = "雲端儲存成功！ ✔";
            await fetchAllSongs();
            setTimeout(() => statusMsg.innerText = "", 3000);
        }
    }

    function changeKey(amount) {
        currentOffset = (currentOffset + amount) % 12;
        if (currentOffset > 6) currentOffset -= 12; if (currentOffset < -5) currentOffset += 12;
        document.getElementById('keyOffset').innerText = currentOffset === 0 ? "Original" : `Key ${currentOffset > 0 ? '+' : ''}${currentOffset}`;
        renderSong();
    }

    function resetKey() { currentOffset = 0; document.getElementById('keyOffset').innerText = "Original"; renderSong(); }
    
    function transposeChord(chord, offset) {
        if (offset === 0) return chord;
        return chord.replace(/([A-G][#b]?)/g, (match) => {
            let note = match; if (flatMap[note]) note = flatMap[note];
            let index = scale.indexOf(note); if (index === -1) return match;
            return scale[(index + offset + 12) % 12];
        });
    }

    function isChordLine(line) {
        if (line.trim() === "") return false;
        return /^[A-G][#b]?(m|maj|min|7|maj7|m7|sus\d?|add\d?|dim|aug)?(\/[A-G][#b]?)?(\s+[A-G][#b]?(m|maj|min|7|maj7|m7|sus\d?|add\d?|dim|aug)?(\/[A-G][#b]?)?)*$/.test(line.trim());
    }

    function renderSong() {
        const title = document.getElementById('songTitle').value || "未命名歌曲";
        const lyrics = document.getElementById('rawLyrics').value;
        document.getElementById('songTitleView').innerText = title;
        
        const lines = lyrics.split('\n');
        let col1 = "", col2 = "", currentColumn = 1;
        const sectionRegex = /^\[(Verse\s*\d*|Chorus\s*\d*|Pre-Chorus|Bridge|Coda|Intro|Outro|Solo)\]$/i;

        lines.forEach(line => {
            let trimmed = line.trim();
            if (trimmed.toLowerCase() === '[break]') { currentColumn = 2; return; }
            let html = "";
            if (sectionRegex.test(trimmed)) {
                html = `<span class="section-header">${trimmed.match(/^\[(.*)\]$/)[1]}</span>\n`;
            } else if (isChordLine(line)) {
                html = `<span class="chord-line">${line.replace(/([A-G][#b]?[^\s]*)/g, match => transposeChord(match, currentOffset))}</span>`;
            } else {
                html = line === "" ? "\n" : `<span class="text-line">${line}</span>`;
            }
            if (currentColumn === 1) col1 += html; else col2 += html;
        });
        document.getElementById('col1').innerHTML = col1; document.getElementById('col2').innerHTML = col2;
    }
</script>
</body>
</html>
