<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結他Chord庫</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-color: #2563eb; 
            --primary-hover: #1d4ed8; 
            --btn-active: #1e40af;
            --success-hover: #15803d;
            --bg-color: #f8fafc; 
            --card-bg: #ffffff; 
            --text-color: #1e293b; 
            --chord-color: #df5334; 
            --section-bg: #334155; 
            --success-color: #16a34a;
            --border-color: #cbd5e1;
            --input-border: #cbd5e1;
            --instruction-color: #64748b;
            --outline-bg: rgba(255,255,255,0.9);
            --outline-hover: rgba(255,255,255,1);
            --page-scale: 1;
            --lyrics-font-size: 16px;
        }
        [data-theme="dark"] { 
            --bg-color: #0f172a;
            --card-bg: #1b2434;
            --text-color: #f1f5f9;
            --primary-color: #60a5fa;
            --primary-hover: #3b82f6;
            --btn-active: #1d4ed8;
            --success-hover: #22c55e;
            --chord-color: #f87171;
            --section-bg: #2563eb;
            --success-color: #22c55e;
            --border-color: #475569;
            --input-border: #475569;
            --instruction-color: #cbd5e1;
            --outline-bg: rgba(255,255,255,0.08);
            --outline-hover: rgba(255,255,255,0.16);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; transition: background-color 0.2s, color 0.2s; }
        .container { max-width: 1400px; }
        header { text-align: center; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); height: fit-content; transition: background-color 0.2s; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 6px; font-size: 14px; box-sizing: border-box; background-color: var(--card-bg); color: var(--text-color); }
        textarea { font-family: 'Courier New', Courier, monospace; height: 350px; resize: vertical; }
        .toolbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .toolbar-left, .toolbar-right { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
        .toolbar-right { justify-content: flex-end; }
        .toolbar-right select { min-width: 220px; max-width: 260px; }
        .song-meta { font-size: 14px; color: var(--instruction-color); margin-bottom: 12px; }
        .modal-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .modal-grid .form-group { margin-bottom: 0; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background-color 0.2s, transform 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn.active, .btn.active:hover { background-color: var(--btn-active); }
        .material-icons { font-family: 'Material Icons'; font-weight: normal; font-style: normal; font-size: 20px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; font-feature-settings: 'liga'; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
        .btn-success { background-color: var(--success-color); width: auto; margin-top: 0; }
        .btn-success:hover { background-color: var(--success-hover); }
        .btn-outline { background-color: var(--outline-bg); color: var(--text-color); border: 1px solid var(--border-color); }
        .btn-outline:hover { background-color: var(--outline-hover); }
        .floating-add-button { position: fixed; right: 16px; left: auto; bottom: 88px; z-index: 20; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; padding: 0; display: flex; justify-content: center; align-items: center; box-shadow: 0 12px 30px rgba(0,0,0,0.18); }
        .floating-edit-button { position: fixed; right: 16px; left: auto; bottom: 16px; z-index: 20; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; padding: 0; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 24px rgba(0,0,0,0.12); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); opacity: 0; visibility: hidden; transition: opacity 0.2s; z-index: 25; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-window { position: fixed; top: 12%; left: 50%; transform: translate(-50%, -20px); width: min(92%, 540px); background: var(--card-bg); border-radius: 18px; box-shadow: 0 28px 70px rgba(0,0,0,0.15); padding: 24px; opacity: 0; visibility: hidden; transition: opacity 0.2s, transform 0.2s; z-index: 30; }
        .modal-window.active { opacity: 1; visibility: visible; transform: translate(-50%, 0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .modal-header h2 { margin: 0; font-size: 18px; }
        .modal-close { width: 38px; min-width: 38px; height: 38px; border-radius: 50%; font-size: 18px; }
        .modal-actions { display: flex; justify-content: flex-end; margin-top: 18px; }
        .key-display, .zoom-display { font-weight: 600; min-width: 80px; text-align: center; }
        .song-title-view { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .song-title-view.placeholder { color: var(--instruction-color); font-style: italic; }
        .lyrics-sheet { column-gap: 40px; column-count: 1; column-fill: auto; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: var(--lyrics-font-size); line-height: 1.25; }
        @media (min-width: 768px) { .lyrics-sheet { column-count: 2; } }
        @media (min-width: 1024px) { .lyrics-sheet { column-count: 3; } }
        .lyrics-sheet.hide-chords .chord-line { display: none; }
        .lyrics-section { display: block; break-inside: avoid; -webkit-column-break-inside: avoid; page-break-inside: avoid; margin-bottom: 0px; white-space: pre-wrap; }
        /* 只有當 section 緊接在另一個 section 後面時，才補一點點底邊距，確保有一行空間 */
        .lyrics-section + .lyrics-section { margin-top: 4px; }
        .column { font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.25; white-space: pre-wrap; }
        .chord-line { color: var(--chord-color); font-weight: bold; margin-bottom: 0; display: block; white-space: pre; }
        /* make lyric lines that immediately follow a chord line sit closer */
        .chord-line + .text-line { margin-top: 0; }
        .text-line { display: block; margin-top: 2px; margin-bottom: 6px; white-space: pre-wrap; }
        .section-header { display: inline-block; background-color: var(--section-bg); color: white; padding: 2px 10px; border-radius: 4px; font-weight: bold; font-size: 13px; margin-top: 14px; margin-bottom: 6px; }
        .instruction { font-size: 12px; color: var(--instruction-color); margin-top: 4px; line-height: 1.4; }
        #themeToggle { min-width: 44px; padding: 8px 12px; font-size: 16px; }
        #statusMsg { font-size: 12px; color: var(--success-color); font-weight: bold; margin-left: auto; }
    </style>
</head>
<body>
<button class="btn btn-primary floating-add-button" id="addSongButton" onclick="openNewSongModal()" aria-label="新增歌曲" title="新增歌曲">+</button>
<button class="btn btn-outline floating-edit-button" id="editSongButton" onclick="openEditSongModal()" aria-label="編輯歌曲" title="編輯歌曲">✎</button>
<div class="container">
    <header><h1>結他Chord庫v0.2h</h1></header>
    <div class="grid">
        <div id="songModalOverlay" class="modal-overlay" onclick="closeSongModal()"></div>
        <div id="songModal" class="modal-window" role="dialog" aria-modal="true" aria-labelledby="songModalTitle">
            <div class="modal-header">
                <h2 id="songModalTitle">新增 / 編輯歌曲</h2>
                <button class="btn btn-outline modal-close" onclick="closeSongModal()" aria-label="關閉">×</button>
            </div>
            <div class="form-group">
                <label for="songTitle">歌名 (Song Title)</label>
                <input type="text" id="songTitle" placeholder="請輸入歌名...">
            </div>
            <div class="modal-grid">
                <div class="form-group">
                    <label for="originalKey">原 key (Original Key)</label>
                    <input type="text" id="originalKey" placeholder="例如 C、G、Am">
                </div>
                <div class="form-group">
                    <label for="songKey">歌詞 key (Song Key)</label>
                    <input type="text" id="songKey" placeholder="例如 C、G、Am">
                </div>
                <div class="form-group">
                    <label for="capo">Capo</label>
                    <input type="number" id="capo" min="0" max="12" placeholder="0">
                </div>
            </div>
            <div class="form-group">
                <label for="rawLyrics">樂譜與歌詞內容</label>
                <textarea id="rawLyrics" placeholder="[Intro]&#10;C  G  Am  F&#10;&#10;[Verse 1]&#10;C        G&#10;今天我 寒夜裡看雪飄過&#10;&#10;[break]&#10;&#10;[Chorus]&#10;Am       F&#10;原諒我這一生不羈放縱愛自由"></textarea>
                <div class="instruction">
                    * 結構標籤請用中括號，如：[Verse 1], [Chorus], [Bridge], [Coda]<br>
                    * 歌詞會自動依 section 分欄，不需要手動加 <strong>[break]</strong>；若要強制段落分割仍可使用它。
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-success" onclick="saveSongToCloud()">💾 儲存到雲端 Database</button>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-outline" onclick="changeKey(-1)">-1</button>
                    <span class="key-display" id="keyOffset">Original</span>
                    <button class="btn btn-outline" onclick="changeKey(1)">+1</button>
                    <button class="btn btn-outline" onclick="resetKey()">↺</button>
                    <button type="button" class="btn btn-outline" onclick="toggleChords()" id="toggleChordsBtn" title="顯示/隱藏和弦"><span class="material-icons">music_note</span></button>
                    <button type="button" class="btn btn-outline" id="colBtn1" data-columns="1" onclick="setColumnCount(1)" title="一欄"><span class="material-icons">looks_one</span></button>
                    <button type="button" class="btn btn-outline" id="colBtn2" data-columns="2" onclick="setColumnCount(2)" title="兩欄"><span class="material-icons">looks_two</span></button>
                    <button type="button" class="btn btn-outline" id="colBtn3" data-columns="3" onclick="setColumnCount(3)" title="三欄"><span class="material-icons">looks_3</span></button>
                    <button type="button" class="btn btn-outline" onclick="zoomOut()" title="縮小"><span class="material-icons">zoom_out</span></button>
                    <span class="zoom-display" id="zoomLevel">100%</span>
                    <button type="button" class="btn btn-outline" onclick="zoomIn()" title="放大"><span class="material-icons">zoom_in</span></button>
                    <button type="button" class="btn btn-outline" onclick="resetZoom()" title="重設縮放"><span class="material-icons">refresh</span></button>
                    <button type="button" class="btn btn-outline" id="themeToggle" onclick="toggleDarkMode()" title="切換主題"><span class="material-icons">dark_mode</span></button>
                </div>
                <div class="toolbar-right">
                    <select id="songSelect" onchange="loadSelectedSong()">
                        <option value="">-- ✨ 選擇歌曲 --</option>
                    </select>
                </div>
                <span id="statusMsg"></span>
            </div>
            <div id="songTitleView" class="song-title-view"></div>
            <div id="songDetailsView" class="song-meta"></div>
            <div class="lyrics-sheet" id="lyricsSheet"></div>
        </div>
    </div>
</div>
<script>
    // 保持空殼，GitHub Actions 會自動注入密碼
    const SUPABASE_URL = "https://isuksiavjfjmjdegyuke.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdWtzaWF2amZqbWpkZWd5dWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Njc5NDgsImV4cCI6MjA5NzQ0Mzk0OH0.-6Fa3farVzZ-eJ8_LUmpL_ABsuXK47M_V-lJY67LqSE"; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const scale = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const flatMap = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };
    const outputFlatMap = { 'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb' };
    let currentOffset = 0, fetchedSongs = [];
    let pageZoom = 100, chordsVisible = true;
    let manualColumns = null;
    // Internal virtual capo can go negative while user-visible capo is clamped to 0..12
    // This preserves user key presses even when display is clamped.
    let capoVirtual = null;

    // Dark mode functions
    function loadThemePreference() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme === 'dark' ? 'dark' : 'light');
        updateThemeButton(savedTheme === 'dark');
    }

    function openNewSongModal() {
        const select = document.getElementById('songSelect');
        const titleInput = document.getElementById('songTitle');
        const lyricsInput = document.getElementById('rawLyrics');
        const originalKeyInput = document.getElementById('originalKey');
        const songKeyInput = document.getElementById('songKey');
        const capoInput = document.getElementById('capo');
        if (select) select.value = '';
        if (titleInput) titleInput.value = '';
        if (lyricsInput) lyricsInput.value = '';
        if (originalKeyInput) originalKeyInput.value = '';
        if (songKeyInput) songKeyInput.value = '';
        if (capoInput) capoInput.value = '';
        capoVirtual = null;
        renderSong();
        showSongModal();
    }

    function openEditSongModal() {
        const select = document.getElementById('songSelect');
        if (!select) return alert('找不到歌曲選單');
        const selectedId = select.value;
        if (!selectedId) {
            return alert('請先從歌單選擇要修改的歌曲');
        }
        const song = fetchedSongs.find(s => s.id == selectedId);
        if (!song) return alert('未能找到所選歌曲');
        const titleInput = document.getElementById('songTitle');
        const lyricsInput = document.getElementById('rawLyrics');
        const originalKeyInput = document.getElementById('originalKey');
        const songKeyInput = document.getElementById('songKey');
        const capoInput = document.getElementById('capo');
        if (titleInput) titleInput.value = song.title || '';
        if (lyricsInput) lyricsInput.value = song.lyrics || '';
        if (originalKeyInput) originalKeyInput.value = song.original_key || '';
        if (songKeyInput) songKeyInput.value = song.song_key || '';
        if (capoInput) {
            const capoValue = song.capo !== undefined && song.capo !== null ? String(song.capo) : '';
            capoInput.value = capoValue;
            const parsedCapo = parseInt(capoValue, 10);
            capoVirtual = Number.isNaN(parsedCapo) ? null : parsedCapo;
        }
        renderSong();
        showSongModal();
    }

    function updateEditButtonState() {
        const select = document.getElementById('songSelect');
        const btn = document.getElementById('editSongButton');
        if (!btn) return;
        const has = select && select.value;
        btn.disabled = !has;
        btn.style.opacity = has ? '1' : '0.5';
        btn.title = has ? '編輯歌曲' : '請先選擇歌曲';
    }

    function showSongModal() {
        const overlay = document.getElementById('songModalOverlay');
        const modal = document.getElementById('songModal');
        if (overlay) overlay.classList.add('active');
        if (modal) modal.classList.add('active');
    }

    function closeSongModal() {
        const overlay = document.getElementById('songModalOverlay');
        const modal = document.getElementById('songModal');
        if (overlay) overlay.classList.remove('active');
        if (modal) modal.classList.remove('active');
    }

    function loadZoomPreference() {
        const storedZoom = parseInt(localStorage.getItem('pageZoom'), 10);
        if (!Number.isNaN(storedZoom)) {
            pageZoom = storedZoom;
        }
        setZoom(pageZoom);
    }

    function toggleChords() {
        chordsVisible = !chordsVisible;
        localStorage.setItem('chordsVisible', chordsVisible);
        updateChordVisibility();
    }

    function loadChordPreference() {
        const stored = localStorage.getItem('chordsVisible');
        if (stored !== null) {
            chordsVisible = stored === 'true';
        }
        updateChordVisibility();
    }

    function updateChordVisibility() {
        const sheet = document.getElementById('lyricsSheet');
        const btn = document.getElementById('toggleChordsBtn');
        if (!sheet || !btn) return;
        sheet.classList.toggle('hide-chords', !chordsVisible);
        btn.innerHTML = chordsVisible ? '<span class="material-icons">music_note</span>' : '<span class="material-icons">music_off</span>';
        btn.title = chordsVisible ? '隱藏和弦' : '顯示和弦';
    }

    function normalizeKeyInput(key) {
        const match = key.trim().match(/^([A-G])([#b])?/i);
        if (!match) return null;
        const letter = match[1].toUpperCase();
        const accidental = match[2] ? (match[2] === 'b' ? 'b' : '#') : '';
        const note = letter + accidental;
        return flatMap[note] || note;
    }

    function calculateCapo(originalKey, songKey) {
        const originalRoot = normalizeKeyInput(originalKey);
        const songRoot = normalizeKeyInput(songKey);
        if (!originalRoot || !songRoot) return null;
        const originalIndex = scale.indexOf(originalRoot);
        const songIndex = scale.indexOf(songRoot);
        if (originalIndex === -1 || songIndex === -1) return null;
        // Signed capo difference: originalKey - songKey.
        // This preserves negative direction for cases where the displayed chart is above the original.
        return originalIndex - songIndex;
    }

    function updateCapoFromKeys() {
        const originalKeyInput = document.getElementById('originalKey');
        const songKeyInput = document.getElementById('songKey');
        const capoInput = document.getElementById('capo');
        if (!originalKeyInput || !songKeyInput || !capoInput) return;
        const originalKey = originalKeyInput.value.trim();
        const songKey = songKeyInput.value.trim();
        if (!originalKey || !songKey) return;
        const capo = calculateCapo(originalKey, songKey);
        if (capo !== null) {
            capoVirtual = capo;
            capoInput.value = Math.max(0, Math.min(12, capo));
        }
    }

    function updateColumnButtons() {
        [1, 2, 3].forEach(count => {
            const button = document.getElementById('colBtn' + count);
            if (button) button.classList.toggle('active', manualColumns === count);
        });
    }

    function setColumnCount(count) {
        if (![1, 2, 3].includes(count)) return;
        manualColumns = count;
        updateColumnButtons();
        updateColumnCount();
        renderSong();
    }

    function initializeColumnButtons() {
        updateColumnButtons();
    }

    function updateColumnCount() {
        const sheet = document.getElementById('lyricsSheet');
        if (!sheet) return;
        let count = 1;
        if (manualColumns !== null) {
            count = manualColumns;
        } else {
            const width = Math.round(sheet.getBoundingClientRect().width);
            if (width >= 780) count = 3;
            else if (width >= 520) count = 2;
        }
        sheet.style.columnCount = count;
    }

    function setZoom(value) {
        pageZoom = Math.max(50, Math.min(150, value));
        // Adjust lyrics font-size rather than scaling the whole container so
        // the layout (column count) can reflow based on actual width.
        const base = 16; // base font size in px
        document.documentElement.style.setProperty('--lyrics-font-size', (base * pageZoom / 100) + 'px');
        const zoomLabel = document.getElementById('zoomLevel');
        if (zoomLabel) zoomLabel.innerText = pageZoom + '%';
        localStorage.setItem('pageZoom', pageZoom);
        updateColumnCount();
    }

    function zoomIn() { setZoom(pageZoom + 10); }
    function zoomOut() { setZoom(pageZoom - 10); }
    function resetZoom() { setZoom(100); }

    function toggleDarkMode() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButton(newTheme === 'dark');
    }

    function updateThemeButton(isDark) {
        const btn = document.getElementById('themeToggle');
        if (btn) btn.innerHTML = isDark ? '<span class="material-icons">light_mode</span>' : '<span class="material-icons">dark_mode</span>';
    }

    window.onload = function() {
        loadThemePreference();
        loadZoomPreference();
        loadChordPreference();
        fetchAllSongs();
        renderSong();
        initializeColumnButtons();
        updateColumnCount();
        updateColumnButtons();
        const select = document.getElementById('songSelect');
        if (select) select.addEventListener('change', updateEditButtonState);
    };

    window.addEventListener('resize', () => {
        updateColumnCount();
    });

    // 即時預覽
    document.getElementById('songTitle').addEventListener('input', () => renderSong());
    document.getElementById('originalKey').addEventListener('input', () => {
        updateCapoFromKeys();
        renderSong();
    });
    document.getElementById('songKey').addEventListener('input', () => {
        updateCapoFromKeys();
        renderSong();
    });
    document.getElementById('capo').addEventListener('input', function (e) {
        const v = parseInt(e.target.value, 10);
        capoVirtual = Number.isNaN(v) ? null : v;
        renderSong();
    });
    document.getElementById('rawLyrics').addEventListener('input', () => renderSong());

    async function fetchAllSongs() {
        const { data, error } = await _supabase.from('songs').select('*').order('title', { ascending: true });
        if (error) return console.error(error);
        fetchedSongs = data;
        const select = document.getElementById('songSelect');
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- ✨ 選擇歌曲 --</option>';
        data.forEach(song => {
            const option = document.createElement('option');
            option.value = song.id; option.innerText = song.title;
            select.appendChild(option);
        });
        if (currentVal) select.value = currentVal;
        updateEditButtonState();
    }

    function loadSelectedSong() {
        const selectedId = document.getElementById('songSelect').value;
        const titleInput = document.getElementById('songTitle');
        const lyricsInput = document.getElementById('rawLyrics');
        const originalKeyInput = document.getElementById('originalKey');
        const songKeyInput = document.getElementById('songKey');
        const capoInput = document.getElementById('capo');
        if (!selectedId) {
            if (titleInput) titleInput.value = "";
            if (lyricsInput) lyricsInput.value = "";
            if (originalKeyInput) originalKeyInput.value = "";
            if (songKeyInput) songKeyInput.value = "";
            if (capoInput) capoInput.value = "";
            resetKey(); renderSong();
            return;
        }
        const song = fetchedSongs.find(s => s.id == selectedId);
        if (song) {
            if (titleInput) titleInput.value = song.title || '';
            if (lyricsInput) lyricsInput.value = song.lyrics || '';
            if (originalKeyInput) originalKeyInput.value = song.original_key || '';
            if (songKeyInput) songKeyInput.value = song.song_key || '';
            if (capoInput) {
                const capoValue = song.capo !== undefined && song.capo !== null ? String(song.capo) : '';
                capoInput.value = capoValue;
                const parsedCapo = parseInt(capoValue, 10);
                capoVirtual = Number.isNaN(parsedCapo) ? null : parsedCapo;
            }
            currentOffset = 0;
            document.getElementById('keyOffset').innerText = "Original";
            renderSong();
        }
    }

    // 新增或更新歌曲到 Supabase
    async function saveSongToCloud() {
        const title = document.getElementById('songTitle').value.trim();
        const lyrics = document.getElementById('rawLyrics').value;
        const originalKey = document.getElementById('originalKey').value.trim();
        const songKey = document.getElementById('songKey').value.trim();
        const capo = parseInt(document.getElementById('capo').value, 10) || 0;
        const selectedId = document.getElementById('songSelect').value;
        const statusMsg = document.getElementById('statusMsg');

        if (!title) return alert('請先輸入歌名！');

        statusMsg.innerText = "正在儲存...";
        let error, newId = null;
        const songPayload = { title, lyrics, original_key: originalKey || null, song_key: songKey || null, capo: capoVirtual !== null ? capoVirtual : 0 };

        if (selectedId) {
            // update existing song and fetch updated rows (handle array or single)
            const result = await _supabase.from('songs').update(songPayload).eq('id', selectedId).select();
            error = result.error;
            if (!error && result.data) {
                if (Array.isArray(result.data)) newId = result.data[0] && result.data[0].id;
                else newId = result.data.id || null;
            }
        } else {
            // insert new song and fetch inserted rows (handle array or single)
            const result = await _supabase.from('songs').insert([songPayload]).select();
            error = result.error;
            if (!error && result.data) {
                if (Array.isArray(result.data)) newId = result.data[0] && result.data[0].id;
                else newId = result.data.id || null;
            }
        }

        if (error) {
            statusMsg.innerText = "儲存失敗 ❌";
            alert("錯誤: " + error.message);
        } else {
            statusMsg.innerText = "雲端儲存成功！ ✔";
            await fetchAllSongs();
            // auto-select the saved/created song
            const select = document.getElementById('songSelect');
            if (select && newId) {
                select.value = newId;
                loadSelectedSong();
            }
            closeSongModal();
            setTimeout(() => statusMsg.innerText = "", 3000);
        }
    }

    function adjustCapo(amount) {
        const capoInput = document.getElementById('capo');
        if (!capoInput) return;
        if (capoVirtual === null) {
            const parsed = parseInt(capoInput.value, 10);
            capoVirtual = Number.isNaN(parsed) ? 0 : parsed;
        }
        capoVirtual += amount;
        const display = Math.max(0, Math.min(12, capoVirtual));
        capoInput.value = display;
    }

    function changeKey(amount) {
        const originalKeyInput = document.getElementById('originalKey');
        const songKeyInput = document.getElementById('songKey');
        const capoInput = document.getElementById('capo');
        const hasKeys = originalKeyInput && songKeyInput && originalKeyInput.value.trim() && songKeyInput.value.trim();
        
        if (hasKeys) {
            // When we have originalKey and songKey, transposition is via currentOffset
            currentOffset = (currentOffset + amount) % 12;
            if (currentOffset > 6) currentOffset -= 12;
            if (currentOffset < -5) currentOffset += 12;
            
            const originalKey = originalKeyInput.value.trim();
            const songKey = songKeyInput.value.trim();
            const baseCapo = calculateCapo(originalKey, songKey) || 0;
            // When currentOffset increases (user presses +), songKey notes go up,
            // so capo must decrease: newCapo = baseCapo - currentOffset.
            const newCapo = baseCapo - currentOffset;
            capoVirtual = newCapo;
            if (capoInput) capoInput.value = Math.max(0, Math.min(12, newCapo));
        } else {
            // Without keys, transposition is via capo adjustment directly
            adjustCapo(amount);
        }
        document.getElementById('keyOffset').innerText = currentOffset === 0 ? "Original" : `Key ${currentOffset > 0 ? '+' : ''}${currentOffset}`;
        renderSong();
    }

    function resetKey() { currentOffset = 0; document.getElementById('keyOffset').innerText = "Original"; updateCapoFromKeys(); renderSong(); }
    
    function shouldUseSharps() {
        const songKey = document.getElementById('songKey')?.value.trim();
        const originalKey = document.getElementById('originalKey')?.value.trim();
        const baseKey = songKey || originalKey || 'C';
        const normalized = normalizeKeyInput(baseKey) || 'C';
        const flatKeys = ['F', 'Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cb'];
        const baseIndex = scale.indexOf(normalized);
        if (baseIndex === -1) return true;
        const targetRoot = scale[(baseIndex + currentOffset + 12) % 12];
        return !flatKeys.includes(targetRoot);
    }

    function transposeChord(chord, offset) {
        const useSharps = shouldUseSharps();
        return chord.replace(/([A-G][#b]?)/g, (match) => {
            const normalizedNote = flatMap[match] || match;
            const index = scale.indexOf(normalizedNote);
            if (index === -1) return match;
            const transposed = offset === 0 ? scale[index] : scale[(index + offset + 12) % 12];
            return useSharps ? transposed : outputFlatMap[transposed] || transposed;
        });
    }

    function isChordLine(line) {
        if (line.trim() === "") return false;
        return /^[A-G][#b]?(m|maj|min|7|maj7|m7|sus\d?|add\d?|dim|aug)?(\/[A-G][#b]?)?(\s+[A-G][#b]?(m|maj|min|7|maj7|m7|sus\d?|add\d?|dim|aug)?(\/[A-G][#b]?)?)*$/.test(line.trim());
    }

    function renderSong() {
        const title = document.getElementById('songTitle').value || "";
        const lyrics = document.getElementById('rawLyrics').value;
        const originalKey = document.getElementById('originalKey').value || '';
        const songKey = document.getElementById('songKey').value || '';
        const capo = document.getElementById('capo').value || '';
        const titleView = document.getElementById('songTitleView');
        const detailsView = document.getElementById('songDetailsView');
        if (titleView) {
            if (title === '') {
                titleView.innerText = '請選擇歌曲';
                titleView.classList.add('placeholder');
            } else {
                titleView.innerText = title;
                titleView.classList.remove('placeholder');
            }
        }
        if (detailsView) {
            const details = [];
            if (originalKey) details.push(`原Key: ${originalKey}`);
            if (songKey) details.push(`歌詞Key: ${songKey}`);
            if (capo !== '' && capo !== '0') details.push(`Capo: ${capo}`);
            detailsView.innerText = details.join(' · ');
        }

        const lines = lyrics.split('\n');
        while (lines.length && lines[0].trim() === '') {
            lines.shift();
        }
        const sections = [];
        let currentSection = { header: '', lines: [] };
        const sectionRegex = /^\[(Verse\s*\d*|Chorus\s*\d*|Pre-Chorus|Bridge|Coda|Intro|Outro|Solo)\]$/i;

        function pushSection() {
            if (currentSection.header || currentSection.lines.length) {
                sections.push(currentSection);
                currentSection = { header: '', lines: [] };
            }
        }

        lines.forEach(line => {
            const trimmed = line.trim();
            if (trimmed.toLowerCase() === '[break]') {
                pushSection();
                return;
            }
            if (sectionRegex.test(trimmed)) {
                pushSection();
                currentSection.header = trimmed.match(/^\[(.*)\]$/)[1];
                return;
            }
            currentSection.lines.push(line);
        });
        pushSection();

        const sheet = document.getElementById('lyricsSheet');
        if (!sheet) return;

        sheet.innerHTML = sections.map(section => {
            let html = '<div class="lyrics-section">';
            if (section.header) html += `<div class="section-header">${section.header}</div>`;
            section.lines.forEach(line => {
                if (line.trim() === '') {
                    html += '<div class="text-line">&nbsp;</div>';
                } else if (isChordLine(line)) {
                    html += `<div class="chord-line">${line.replace(/([A-G][#b]?[^\s]*)/g, match => transposeChord(match, currentOffset))}</div>`;
                } else {
                    html += `<div class="text-line">${line}</div>`;
                }
            });
            html += '</div>';
            return html;
        }).join('');
        updateColumnCount();
    }
</script>
